version: "3.9"

services:

  # ── Backend API ─────────────────────────────────────────────────────────────
  api:
    build: .
    container_name: deepfake_api
    ports:
      - "8000:8000"
    environment:
      - DEVICE=cpu          # change to cuda if GPU available
      - REDIS_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data    # persist uploads and model weights
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]   # comment out if no GPU

  # ── Celery Worker (batch processing) ────────────────────────────────────────
  worker:
    build: .
    container_name: deepfake_worker
    command: >
      celery -A backend.worker worker
      --loglevel=info
      --concurrency=2
      --queues=celery
    environment:
      - DEVICE=cpu
      - REDIS_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - redis
      - api
    restart: unless-stopped

  # ── Redis (job queue + result cache) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: deepfake_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Frontend (Nginx serving React build) ────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: deepfake_frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

  # ── MLflow (experiment tracking) ────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.1
    container_name: deepfake_mlflow
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000
    volumes:
      - ./mlruns:/mlruns
    restart: unless-stopped

volumes:
  data:
  logs:
  mlruns: